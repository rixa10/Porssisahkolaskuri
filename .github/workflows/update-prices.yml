name: Update spot prices

on:
  schedule:
    # 08:30 UTC daily — day-ahead prices for the next day are typically
    # published around 13:00 EET (10:00 UTC), so this catches yesterday
    # and today reliably without racing the publication.
    - cron: "30 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest prices
        run: python scripts/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/spot-prices.json)" ]; then
            git add data/spot-prices.json
            git commit -m "Update spot prices ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No price changes."
          fi
